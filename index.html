<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timesheet Calculator</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #111;
      --card: #f5f5f5;
    }

    body.dark {
      --bg: #0f172a;
      --text: #f1f5f9;
      --card: #1e293b;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: var(--card);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: 300px;
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #4f46e5;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }

    .toggle {
      position: absolute;
      top: 20px;
      right: 20px;
      cursor: pointer;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="toggle" onclick="toggleMode()">🌙/☀️</div>

<div class="container">
  <h2>🕒 Timesheet</h2>

  <input id="completed" placeholder="Completed (HH:MM)" />
  <input id="required" value="8:20" />

  <button onclick="calculate()">Calculate</button>

  <div class="result" id="result"></div>
</div>

<script>
function toMinutes(time) {
  let [h, m] = time.split(":").map(Number);
  return h * 60 + m;
}

function toTime(minutes) {
  let h = Math.floor(minutes / 60);
  let m = minutes % 60;
  let ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `${h}:${m.toString().padStart(2,'0')} ${ampm}`;
}

function getCurrentTimeMinutes() {
  let now = new Date();
  return now.getHours() * 60 + now.getMinutes();
}

function calculate() {
  let completed = toMinutes(document.getElementById("completed").value);
  let required = toMinutes(document.getElementById("required").value);
  let current = getCurrentTimeMinutes();

  let remaining = required - completed;
  let leaveTime = current + remaining;

  document.getElementById("result").innerText =
    "Go home at: " + toTime(leaveTime);
}

function toggleMode() {
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
