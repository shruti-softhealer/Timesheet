<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timesheet ✨</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@1,700&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#060412;--card-bg:rgba(10,6,20,0.72);--border:rgba(255,255,255,0.08);
      --text:#f0e8ff;--muted:rgba(240,232,255,0.45);
      --input-bg:rgba(255,255,255,0.05);--input-border:rgba(255,255,255,0.1);
      --input-color:white;--input-ph:rgba(255,255,255,0.25);--clock-bg:rgba(255,255,255,0.04);
      --btn-grad:linear-gradient(135deg,#a855f7,#ec4899,#f59e0b);
      --shimmer:linear-gradient(90deg,transparent,#c084fc,#f472b6,#67e8f9,transparent);
      --result-bg:linear-gradient(135deg,rgba(168,85,247,.18),rgba(236,72,153,.12),rgba(6,182,212,.12));
      --badge-bg:rgba(255,255,255,0.07);--dot:#6ee7b7;--a1:#c084fc;--a2:#f472b6;--a3:#67e8f9;
    }
    body.light{--bg:#eef2ff;--card-bg:rgba(255,255,255,0.88);--border:rgba(0,0,0,0.08);--text:#1a1040;--muted:rgba(60,40,100,0.5);--input-bg:rgba(0,0,0,0.04);--input-border:rgba(0,0,0,0.12);--input-color:#1a1040;--input-ph:rgba(60,40,100,0.3);--clock-bg:rgba(0,0,0,0.04);--badge-bg:rgba(0,0,0,0.05);}
    body.barbie{--bg:#020e04;--card-bg:rgba(0,40,10,0.80);--border:rgba(0,200,80,0.2);--text:#e8ffe8;--muted:rgba(150,255,150,0.5);--input-bg:rgba(0,180,60,0.08);--input-border:rgba(0,200,80,0.22);--input-color:#e8ffe8;--input-ph:rgba(100,220,120,0.38);--clock-bg:rgba(0,180,60,0.08);--btn-grad:linear-gradient(135deg,#00b33c,#ffd700,#00e64d,#ffd700);--shimmer:linear-gradient(90deg,transparent,#00e64d,#ffd700,#00b33c,transparent);--result-bg:linear-gradient(135deg,rgba(0,180,60,.2),rgba(255,215,0,.12));--badge-bg:rgba(0,180,60,0.12);--dot:#00e64d;--a1:#00e64d;--a2:#ffd700;--a3:#00b33c;}
    body.fairy{--bg:#07001a;--card-bg:rgba(18,4,45,0.70);--border:rgba(210,160,255,0.18);--text:#f5e8ff;--muted:rgba(220,180,255,0.55);--input-bg:rgba(160,80,255,0.10);--input-border:rgba(200,140,255,0.22);--input-color:#f5e8ff;--input-ph:rgba(200,150,255,0.38);--clock-bg:rgba(160,80,255,0.10);--btn-grad:linear-gradient(135deg,#9b30ff,#e040fb,#7c4dff);--shimmer:linear-gradient(90deg,transparent,#e040fb,#ce93d8,#b39ddb,transparent);--result-bg:linear-gradient(135deg,rgba(156,39,176,.22),rgba(103,58,183,.18));--badge-bg:rgba(160,80,255,0.14);--dot:#ce93d8;--a1:#e040fb;--a2:#ce93d8;--a3:#b39ddb;}
    body.racing{--bg:#050505;--card-bg:rgba(8,8,8,0.88);--border:rgba(255,60,0,0.3);--text:#fff;--muted:rgba(255,180,80,0.6);--input-bg:rgba(255,60,0,0.06);--input-border:rgba(255,60,0,0.3);--input-color:#fff;--input-ph:rgba(255,140,80,0.4);--clock-bg:rgba(255,60,0,0.08);--btn-grad:linear-gradient(135deg,#ff2200,#ff6600,#ffd700,#ff2200);--shimmer:linear-gradient(90deg,transparent,#ff2200,#ffd700,#ff6600,transparent);--result-bg:linear-gradient(135deg,rgba(255,34,0,.2),rgba(255,102,0,.15));--badge-bg:rgba(255,60,0,0.12);--dot:#ff2200;--a1:#ff2200;--a2:#ffd700;--a3:#ff6600;}
    body.galaxy{--bg:#000510;--card-bg:rgba(5,10,30,0.75);--border:rgba(100,160,255,0.15);--text:#e8f4ff;--muted:rgba(160,200,255,0.5);--input-bg:rgba(50,100,255,0.08);--input-border:rgba(100,160,255,0.2);--input-color:#e8f4ff;--input-ph:rgba(160,200,255,0.35);--clock-bg:rgba(50,100,255,0.08);--btn-grad:linear-gradient(135deg,#1a3aff,#7b2fff,#00d4ff,#1a3aff);--shimmer:linear-gradient(90deg,transparent,#7b2fff,#00d4ff,#1a3aff,transparent);--result-bg:linear-gradient(135deg,rgba(27,58,255,.2),rgba(123,47,255,.15));--badge-bg:rgba(50,100,255,0.1);--dot:#00d4ff;--a1:#7b2fff;--a2:#00d4ff;--a3:#a78bfa;}

    body{font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--bg);color:var(--text);transition:background 0.6s;}
    canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

    .blobs{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
    .blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.22;animation:blobFloat linear infinite;}
    .blob:nth-child(1){width:500px;height:500px;background:var(--a1);top:-15%;left:-8%;animation-duration:18s;}
    .blob:nth-child(2){width:380px;height:380px;background:var(--a2);top:55%;left:60%;animation-duration:22s;animation-delay:-5s;}
    .blob:nth-child(3){width:300px;height:300px;background:var(--a3);top:25%;left:75%;animation-duration:16s;animation-delay:-9s;}
    .blob:nth-child(4){width:420px;height:420px;background:var(--a1);top:70%;left:-10%;animation-duration:25s;animation-delay:-3s;}
    .blob:nth-child(5){width:240px;height:240px;background:var(--a2);top:8%;left:50%;animation-duration:20s;animation-delay:-12s;}
    @keyframes blobFloat{0%{transform:translate(0,0) scale(1);}25%{transform:translate(35px,-45px) scale(1.1);}50%{transform:translate(-25px,35px) scale(0.93);}75%{transform:translate(45px,22px) scale(1.07);}100%{transform:translate(0,0) scale(1);}}
    body.light .blob{opacity:0.1;}
    body.galaxy .blob{opacity:0.15;filter:blur(100px);}

    .controls{position:fixed;top:16px;right:16px;z-index:200;display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end;max-width:320px;}
    .ctrl-btn{padding:7px 13px;border-radius:50px;border:1px solid var(--border);background:var(--card-bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.76rem;font-weight:600;cursor:pointer;backdrop-filter:blur(16px);transition:transform 0.15s,box-shadow 0.15s,background 0.3s;white-space:nowrap;}
    .ctrl-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.35);}
    .ctrl-btn:active{transform:scale(0.95);}
    .theme-label{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:200;background:var(--card-bg);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:50px;padding:6px 20px;font-size:0.72rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);pointer-events:none;opacity:0;transition:opacity 0.4s;}
    .theme-label.show{opacity:1;}

    .card{position:relative;z-index:10;width:390px;background:var(--card-bg);backdrop-filter:blur(36px) saturate(200%);border:1px solid var(--border);border-radius:28px;padding:32px 30px 28px;transition:background 0.4s,border-color 0.4s,box-shadow 0.4s;animation:cardIn 0.7s cubic-bezier(.22,1,.36,1) both;box-shadow:0 24px 60px rgba(0,0,0,0.5),0 0 80px rgba(192,132,252,0.08);}
    @keyframes cardIn{from{opacity:0;transform:translateY(28px) scale(0.96)}to{opacity:1;transform:translateY(0) scale(1)}}
    .card::before{content:'';position:absolute;top:0;left:8%;right:8%;height:1px;background:var(--shimmer);border-radius:999px;animation:shimmerLine 3s ease-in-out infinite;}
    @keyframes shimmerLine{0%,100%{opacity:0.5;transform:scaleX(0.8)}50%{opacity:1;transform:scaleX(1)}}
    body.barbie .card{box-shadow:0 0 0 1px rgba(0,200,80,0.15),0 24px 60px rgba(0,0,0,0.7),0 0 80px rgba(0,180,60,0.12);}
    body.fairy  .card{box-shadow:0 24px 60px rgba(0,0,0,0.7),0 0 100px rgba(224,64,251,0.3);}
    body.racing .card{box-shadow:0 0 0 1px rgba(255,60,0,0.2),0 24px 60px rgba(0,0,0,0.8),0 0 60px rgba(255,34,0,0.25);}
    body.galaxy .card{box-shadow:0 0 0 1px rgba(100,160,255,0.12),0 24px 80px rgba(0,5,40,0.9),0 0 120px rgba(123,47,255,0.2);}

    .header{text-align:center;margin-bottom:20px;}
    .emoji-icon{font-size:2rem;display:block;margin-bottom:6px;animation:iconBob 2.5s ease-in-out infinite;transition:opacity 0.7s;}
    @keyframes iconBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
    .title{font-family:'Playfair Display',serif;font-size:1rem;font-style:italic;line-height:1.5;background:linear-gradient(120deg,var(--a1),var(--a2),var(--a3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;transition:opacity 0.7s;padding:0 4px;}
    body.racing .title{font-family:'Rajdhani',sans-serif;font-style:normal;font-weight:700;font-size:1rem;letter-spacing:0.05em;}
    body.galaxy .title{font-family:'DM Sans',sans-serif;font-style:normal;font-weight:600;letter-spacing:0.02em;}
    .subtitle{font-size:0.7rem;color:var(--muted);margin-top:4px;letter-spacing:0.06em;transition:opacity 0.7s;}

    .clock-wrap{display:flex;align-items:center;justify-content:center;gap:10px;background:var(--clock-bg);border:1px solid var(--border);border-radius:14px;padding:9px 16px;margin-bottom:16px;transition:background 0.4s;}
    .clock-dot{width:7px;height:7px;border-radius:50%;background:var(--dot);box-shadow:0 0 8px var(--dot);animation:pulse 1.5s ease-in-out infinite;}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.7)}}
    #clock{font-size:0.88rem;font-weight:600;letter-spacing:0.05em;color:var(--text);}
    body.racing #clock{font-family:'Rajdhani',sans-serif;font-size:1rem;letter-spacing:0.1em;}

    .field{margin-bottom:12px;}
    .field label{display:block;font-size:0.7rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
    .input-wrap{position:relative;}
    .input-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:1rem;pointer-events:none;}
    input[type="text"]{width:100%;padding:12px 13px 12px 38px;background:var(--input-bg);border:1px solid var(--input-border);border-radius:13px;color:var(--input-color);font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:500;outline:none;transition:border-color 0.25s,box-shadow 0.25s,background 0.25s;}
    input[type="text"]::placeholder{color:var(--input-ph);}
    input[type="text"]:focus{border-color:var(--a1);box-shadow:0 0 0 3px rgba(168,85,247,0.15);}
    body.barbie input[type="text"]:focus{box-shadow:0 0 0 3px rgba(0,200,80,0.2);}
    body.racing input[type="text"]:focus{box-shadow:0 0 0 3px rgba(255,60,0,0.2);}
    body.galaxy input[type="text"]:focus{box-shadow:0 0 0 3px rgba(0,212,255,0.2);}

    .name-row{display:flex;gap:8px;margin-bottom:12px;}
    .name-row input{flex:1;padding:10px 13px;background:var(--input-bg);border:1px solid var(--input-border);border-radius:12px;color:var(--input-color);font-family:'DM Sans',sans-serif;font-size:0.88rem;outline:none;transition:border-color 0.25s;}
    .name-row input::placeholder{color:var(--input-ph);}
    .name-row input:focus{border-color:var(--a1);}

    .calc-btn{width:100%;padding:14px;margin-top:4px;border:none;border-radius:16px;background:var(--btn-grad);background-size:300% 300%;color:white;font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;letter-spacing:0.04em;position:relative;overflow:hidden;transition:transform 0.15s,box-shadow 0.15s;animation:gradShift 5s ease infinite;}
    @keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
    .calc-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(rgba(255,255,255,0.12),transparent);pointer-events:none;}
    .calc-btn:hover{transform:translateY(-2px);box-shadow:0 10px 35px rgba(168,85,247,0.4);}
    .calc-btn:active{transform:translateY(0);}
    body.racing .calc-btn{font-family:'Rajdhani',sans-serif;letter-spacing:0.15em;}

    .result{margin-top:14px;display:none;}
    .result.show{display:block;animation:resultIn 0.5s cubic-bezier(.22,1,.36,1) both;}
    @keyframes resultIn{from{opacity:0;transform:translateY(10px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
    .result-inner{background:var(--result-bg);border:1px solid var(--border);border-radius:18px;padding:18px;text-align:center;}
    .result-label{font-size:0.68rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
    .result-time{font-family:'Playfair Display',serif;font-size:2rem;background:linear-gradient(120deg,var(--a1),var(--a2),var(--a3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;}
    body.racing .result-time{font-family:'Rajdhani',sans-serif;font-size:2.2rem;letter-spacing:0.1em;}
    body.galaxy .result-time{font-family:'DM Sans',sans-serif;font-weight:700;}
    .result-sub{font-size:0.76rem;color:var(--muted);margin-top:5px;}
    .result-extra{display:flex;justify-content:center;gap:10px;margin-top:12px;flex-wrap:wrap;}
    .badge{background:var(--badge-bg);border:1px solid var(--border);border-radius:10px;padding:6px 13px;font-size:0.74rem;font-weight:600;color:var(--text);}
    .badge span{color:var(--muted);font-weight:400;margin-right:4px;}
    .ok{color:#6ee7b7;}
    .error-msg{display:none;margin-top:10px;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);border-radius:12px;padding:9px 13px;font-size:0.78rem;color:#fca5a5;text-align:center;}
    .error-msg.show{display:block;animation:resultIn 0.4s both;}

    /* ══ FRIENDS PANEL ══ */
    .friends-panel{margin-top:14px;background:var(--badge-bg);border:1px solid var(--border);border-radius:18px;padding:13px 15px;}
    .friends-title{font-size:0.68rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:9px;display:flex;align-items:center;gap:6px;}
    .friend-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);}
    .friend-row:last-child{border-bottom:none;}
    .friend-name{font-weight:600;color:var(--text);font-size:0.82rem;}
    .friend-leave{color:var(--a2);font-weight:700;font-size:0.85rem;}
    /* ★ LIVE COUNTDOWN BADGE ★ */
    .friend-countdown{
      font-size:0.72rem;
      font-weight:700;
      padding:3px 9px;
      border-radius:20px;
      margin-top:3px;
      display:inline-block;
      letter-spacing:0.02em;
    }
    .countdown-active{
      background:rgba(110,231,183,0.12);
      color:#6ee7b7;
      border:1px solid rgba(110,231,183,0.25);
    }
    .countdown-done{
      background:rgba(248,113,113,0.12);
      color:#f87171;
      border:1px solid rgba(248,113,113,0.25);
    }
    .countdown-soon{
      background:rgba(251,191,36,0.12);
      color:#fbbf24;
      border:1px solid rgba(251,191,36,0.25);
      animation:pulseBadge 1s ease-in-out infinite;
    }
    @keyframes pulseBadge{0%,100%{opacity:1;}50%{opacity:0.6;}}
    .live-dot{width:6px;height:6px;border-radius:50%;background:#6ee7b7;box-shadow:0 0 6px #6ee7b7;display:inline-block;animation:pulse 1.5s ease-in-out infinite;margin-right:4px;}
    #friendsList .empty{color:var(--muted);font-size:0.78rem;text-align:center;padding:6px 0;}

    /* CLOUD POPUP */
    .cloud-popup{position:fixed;bottom:-260px;right:24px;z-index:9999;width:290px;transition:bottom 0.65s cubic-bezier(.22,1,.36,1);pointer-events:none;}
    .cloud-popup.show{bottom:24px;pointer-events:all;}
    .cloud-shape{position:relative;background:linear-gradient(135deg,#fff 60%,#ffe8f8);border-radius:60px;padding:22px 22px 18px;box-shadow:0 16px 50px rgba(0,0,0,0.2),0 0 0 1px rgba(255,200,230,0.5);animation:cloudWobble 3.5s ease-in-out infinite;}
    .cloud-shape::before{content:'';position:absolute;background:linear-gradient(135deg,#fff,#ffe8f8);border-radius:50%;width:110px;height:85px;top:-42px;left:28px;box-shadow:-2px -4px 15px rgba(255,150,200,0.15);}
    .cloud-shape::after{content:'';position:absolute;background:linear-gradient(135deg,#fff,#f0e8ff);border-radius:50%;width:75px;height:62px;top:-30px;left:120px;box-shadow:-2px -4px 12px rgba(150,100,255,0.1);}
    @keyframes cloudWobble{0%,100%{transform:translateY(0) rotate(-0.5deg);}50%{transform:translateY(-8px) rotate(0.5deg);}}
    .cloud-close{position:absolute;top:10px;right:12px;z-index:2;background:rgba(0,0,0,0.07);border:none;border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:0.72rem;display:flex;align-items:center;justify-content:center;transition:background 0.2s;color:#555;}
    .cloud-close:hover{background:rgba(0,0,0,0.14);}
    .cloud-content{position:relative;z-index:1;text-align:center;}
    .cloud-emoji{font-size:2.2rem;display:block;margin-bottom:5px;animation:iconBob 2s ease-in-out infinite;}
    .cloud-title{font-size:1rem;font-weight:700;color:#1a1040;margin-bottom:3px;}
    .cloud-msg{font-size:0.78rem;color:#666;line-height:1.4;}
    .cloud-time{font-size:1.5rem;font-weight:700;background:linear-gradient(120deg,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-top:4px;}
    .cloud-heart{position:absolute;font-size:1rem;animation:heartFloat 2.2s ease-out forwards;pointer-events:none;}
    @keyframes heartFloat{0%{transform:translateY(0) scale(1) rotate(0deg);opacity:1;}100%{transform:translateY(-70px) scale(0.4) rotate(20deg);opacity:0;}}

    /* DOLLAR BG */
    .barbie-bg{display:none;position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
    body.barbie .barbie-bg{display:block;}
    .barbie-bg::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(0,200,80,0.04) 0px,rgba(0,200,80,0.04) 1px,transparent 1px,transparent 50px),repeating-linear-gradient(90deg,rgba(0,200,80,0.04) 0px,rgba(0,200,80,0.04) 1px,transparent 1px,transparent 50px);}
    .barbie-bg::after{content:'';position:absolute;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(255,215,0,0.12),transparent 65%);top:-200px;right:-200px;animation:blobFloat 14s ease-in-out infinite;}
    .b-item{position:absolute;top:-80px;animation:bRain linear infinite;}
    @keyframes bRain{0%{transform:translateY(-80px) rotate(-20deg) scale(0.7);opacity:0;}8%{opacity:0.9;}92%{opacity:0.9;}100%{transform:translateY(110vh) rotate(30deg) scale(1.2);opacity:0;}}
    .b-glitter{position:absolute;border-radius:2px;animation:glitter ease-in-out infinite;}
    @keyframes glitter{0%,100%{opacity:0;transform:scale(0) rotate(0deg);}50%{opacity:1;transform:scale(1) rotate(45deg);box-shadow:0 0 8px 3px currentColor;}}

    /* FAIRY BG */
    .fairy-layer{display:none;position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
    body.fairy .fairy-layer{display:block;}
    .f-orb{position:absolute;border-radius:50%;animation:fOrb ease-in-out infinite alternate;}
    @keyframes fOrb{0%{transform:translateY(0) scale(1);opacity:0.5;}100%{transform:translateY(-30px) scale(1.2);opacity:0.85;}}
    .f-star{position:absolute;border-radius:50%;animation:fStar ease-in-out infinite;}
    @keyframes fStar{0%,100%{opacity:0.05;transform:scale(0.2);}50%{opacity:1;transform:scale(2);}}
    .f-float{position:absolute;animation:fFloat ease-in-out infinite alternate;}
    @keyframes fFloat{0%{transform:translateY(0) rotate(-5deg);opacity:0.4;}100%{transform:translateY(-24px) rotate(6deg);opacity:0.9;}}

    /* RACING BG */
    .racing-layer{display:none;position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
    body.racing .racing-layer{display:block;}
    .racing-layer::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,rgba(255,255,255,0.02) 0px,rgba(255,255,255,0.02) 1px,transparent 1px,transparent 60px),repeating-linear-gradient(0deg,rgba(255,255,255,0.01) 0px,rgba(255,255,255,0.01) 1px,transparent 1px,transparent 60px);}
    .r-stripe{position:absolute;width:6px;height:70px;background:linear-gradient(180deg,rgba(255,200,0,0.8),rgba(255,200,0,0));border-radius:4px;animation:rStripe linear infinite;}

let qPool=[],qIdx=0,qTimer;
function refreshQuotes(){qPool=QUOTES[themeIdx];qIdx=Math.floor(Math.random()*qPool.length);clearInterval(qTimer);renderQuote();qTimer=setInterval(()=>{qIdx=(qIdx+1)%qPool.length;renderQuote();},8000);}

/* ══ CLOCK ══ */
function updateClock(){
  const now=new Date();let h=now.getHours();
  const m=String(now.getMinutes()).padStart(2,'0'),s=String(now.getSeconds()).padStart(2,'0');
  const ap=h>=12?'PM':'AM';h=h%12||12;
  document.getElementById('clock').textContent=`${CLOCK_PFX[themeIdx]} ${h}:${m}:${s} ${ap}`;
}
setInterval(updateClock,1000);

/* ══ TIME HELPERS ══ */
function parseTime(str){
  str=str.trim().replace(/[^\d:]/g,'');
  if(!str)return null;
  const p=str.split(':');
  let h=parseInt(p[0],10),m=p[1]!==undefined?parseInt(p[1],10):0;
  if(isNaN(h))return null;
  if(isNaN(m))m=0;
  return h*60+m;
}
function fmtTime(mins){
  mins=((mins%1440)+1440)%1440;
  let h=Math.floor(mins/60),m=mins%60;
  const ap=h>=12?'PM':'AM';h=h%12||12;
  return `${h}:${String(m).padStart(2,'0')} ${ap}`;
}
function fmtDur(mins){
  const s=mins<0?'-':'';mins=Math.abs(mins);
  const h=Math.floor(mins/60),m=mins%60;
  if(h===0)return `${s}${m}m`;
  if(m===0)return `${s}${h}h`;
  return `${s}${h}h ${m}m`;
}
function nowMins(){
  const n=new Date();return n.getHours()*60+n.getMinutes();
}

/* ══ ★ LIVE FRIEND COUNTDOWN RENDERER ★ ══ */
window.renderFriends = function(){
  const data = window.friendsData || {};
  const myKey = (document.getElementById('userName').value||'').trim().toLowerCase().replace(/\s+/g,'_');
  const list  = document.getElementById('friendsList');
  list.innerHTML = '';

  const now    = Date.now();
  const cutoff = 12 * 60 * 60 * 1000;
  let count    = 0;
  const curMin = nowMins();

  Object.entries(data).forEach(([key, val]) => {
    if (now - val.updatedAt > cutoff || key === myKey) return;
    count++;

    // ★ LIVE remaining = their leaveAtMinutes - current time in minutes
    const leaveAt  = val.leaveAtMinutes; // saved absolute minutes from midnight
    const remMins  = leaveAt - curMin;

    let countdownHTML, countdownClass;
    if (remMins <= 0) {
      countdownHTML = '✅ Already left!';
      countdownClass = 'countdown-done';
    } else if (remMins <= 15) {
      countdownHTML = `⚡ ${fmtDur(remMins)} to go`;
      countdownClass = 'countdown-soon';
    } else {
      countdownHTML = `⏳ ${fmtDur(remMins)} to go`;
      countdownClass = 'countdown-active';
    }

    const row = document.createElement('div');
    row.className = 'friend-row';
    row.innerHTML = `
      <div>
        <div class="friend-name">👤 ${val.name}</div>
        <span class="friend-countdown ${countdownClass}">${countdownHTML}</span>
      </div>
      <div class="friend-leave">${val.leaveTime}</div>
    `;
    list.appendChild(row);
  });

  if (count === 0) {
    list.innerHTML = '<div class="empty">No friends online yet 👀</div>';
  }
};

// ★ Tick every 60 seconds to update live countdowns
setInterval(() => { window.renderFriends(); }, 60000);
// Also tick every second for the "≤15 min" pulsing badge freshness
setInterval(() => {
  const data = window.friendsData || {};
  const curMin = nowMins();
  Object.values(data).forEach(val => {
    if (val.leaveAtMinutes && (val.leaveAtMinutes - curMin) <= 15 && (val.leaveAtMinutes - curMin) > 0) {
      window.renderFriends();
    }
  });
}, 30000);

/* ══ CALCULATE ══ */
let leaveMinutes=null, cloudTimer=null;
function calculate(){
  const err=document.getElementById('errorMsg');err.classList.remove('show');
  const c=parseTime(document.getElementById('completed').value);
  const r=parseTime(document.getElementById('required').value);
  if(c===null||c<0){err.textContent='⚠️ Enter a valid completed time (e.g. 4:00)';err.classList.add('show');document.getElementById('result').classList.remove('show');return;}
  if(!r||r<=0){err.textContent='⚠️ Enter a valid required hours (e.g. 8:20)';err.classList.add('show');document.getElementById('result').classList.remove('show');return;}

  const curMin = nowMins();
  const rem    = r - c;
  const leave  = curMin + rem;
  leaveMinutes = leave;
  const leaveStr = fmtTime(leave);

  document.getElementById('leaveTime').textContent = leaveStr;
  document.getElementById('resultLabel').textContent = `${RESULT_IC[themeIdx]} You can go home at`;

  if(rem<=0){
    document.getElementById('remainingLabel').textContent="Done. You're free. Get out. 🎉";
    document.getElementById('remainVal').textContent='0m';
    document.getElementById('statusVal').textContent='✅ Done';
    document.getElementById('statusVal').className='ok';
    triggerCloud(leaveStr);
  } else {
    document.getElementById('remainingLabel').textContent=`${fmtDur(rem)} left. You've got this.`;
    document.getElementById('remainVal').textContent=fmtDur(rem);
    if(rem>r*0.5){document.getElementById('statusVal').textContent='⏳ Grinding';document.getElementById('statusVal').className='';}
    else{document.getElementById('statusVal').textContent='🚀 Almost out';document.getElementById('statusVal').className='ok';}
    scheduleCloud(rem);
  }
  document.getElementById('result').classList.add('show');

  // ★ Save leaveAtMinutes (absolute) so friends see live countdown
  const name = document.getElementById('userName').value;
  if(typeof window.saveToFirebase==='function'){
    window.saveToFirebase(name||'Anonymous', leaveStr, leave);
  }
}

/* ══ CLOUD ══ */
function scheduleCloud(rem){clearTimeout(cloudTimer);cloudTimer=setTimeout(()=>triggerCloud(fmtTime(leaveMinutes)),rem*60*1000);}
function triggerCloud(t){

}
function closeCloud(){document.getElementById('cloudPopup').classList.remove('show');}
setInterval(()=>{if(leaveMinutes===null)return;if(nowMins()>=leaveMinutes){triggerCloud(fmtTime(leaveMinutes));leaveMinutes=null;}},60000);

/* ══ PARTICLES ══ */
const canvas=document.getElementById('bg'),ctx=canvas.getContext('2d');
let W,H,particles=[];
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();
const PCOLS=[
  ['#c084fc','#f472b6','#67e8f9','#6ee7b7','#fbbf24'],
  ['#00e64d','#ffd700','#00b33c','#ffc300','#a0ffb0'],
  ['#e040fb','#ce93d8','#b39ddb','#7c4dff','#f8bbd0'],
  ['#ff2200','#ff6600','#ffd700','#ff4400','#fff'],
  ['#7b2fff','#00d4ff','#a78bfa','#1a3aff','#e0f0ff'],
];
function rebuildParticles(){
  const cols=PCOLS[themeIdx];particles=[];
  const n=themeIdx===3?30:themeIdx===4?150:100;
  for(let i=0;i<n;i++) particles.push({
    x:Math.random()*W,y:Math.random()*H,
    r:Math.random()*(themeIdx===4?2.5:1.8)+0.4,
    dx:(Math.random()-0.5)*(themeIdx===3?.12:themeIdx===4?.3:.55),
    dy:(Math.random()-0.5)*(themeIdx===3?.12:themeIdx===4?.3:.55),
    color:cols[Math.floor(Math.random()*cols.length)],
    opacity:Math.random()*.5+.2,tw:Math.random()*Math.PI*2,ts:Math.random()*.02+.01,
  });
}
function h2r(hex,a){if(!hex||hex.length!==7)return `rgba(255,255,255,${a})`;const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function connectPts(){
  if(themeIdx===3)return;
  const LC=['rgba(192,132,252,','rgba(0,200,80,','rgba(200,100,255,','rgba(255,50,0,','rgba(123,47,255,'][themeIdx];
  for(let i=0;i<particles.length;i++) for(let j=i+1;j<particles.length;j++){
    const dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<110){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.strokeStyle=LC+(1-d/110)*.1+')';ctx.lineWidth=.5;ctx.stroke();}
  }
}
function animLoop(){
  ctx.clearRect(0,0,W,H);connectPts();
  particles.forEach(p=>{
    p.tw+=p.ts;const ga=p.opacity+Math.sin(p.tw)*.15;
    if(p.color.startsWith('#')&&p.color.length===7){
      const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*6);
      g.addColorStop(0,h2r(p.color,ga*.5));g.addColorStop(1,'transparent');
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*6,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    }
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.color;ctx.globalAlpha=ga;ctx.fill();ctx.globalAlpha=1;
    p.x+=p.dx;p.y+=p.dy;if(p.x<0||p.x>W)p.dx*=-1;if(p.y<0||p.y>H)p.dy*=-1;
  });
  requestAnimationFrame(animLoop);
}
animLoop();
